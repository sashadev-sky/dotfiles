[extend]
useDefault = true

[[rules]]
id = "context7-api-key"
description = "Context7 API key"
regex = '''ctx7sk-[A-Za-z0-9-]{20,}'''
keywords = ["ctx7sk-"]

[allowlist]
description = "Ignore chezmoi template placeholders, not real keys in templates"
regexes = [
  '''\{\{[^}]*\}\}''',   # any {{ .anything }} expression
]
paths = [
  '''chezmoi\.toml''',   # this file legitimately holds the secret in plaintext locally
]
